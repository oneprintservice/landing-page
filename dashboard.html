<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard OnePrint Service - Ponorogo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        /* CSS KHUSUS CETAK A5 */
        @media print {
            #app-ui, #qr-modal { display: none !important; }
            body { background-color: white; margin: 0; padding: 0; }
            
            @page { size: A5 portrait; margin: 0.1in 0.15in; }

            #print-container { 
                display: block !important; 
                width: 100%;
                font-family: Arial, sans-serif; 
                color: black;
            }

            .invoice-page {
                width: 148mm; min-height: 200mm; box-sizing: border-box; margin: 0 auto; position: relative;
                display: flex; flex-direction: column;
            }

            /* Header Kop */
            .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }
            .header-left { display: flex; align-items: flex-start; }
            .logo-image { width: 60px; height: 60px; margin-right: 12px; object-fit: contain; }
            .company-name { font-size: 20px; font-weight: bold; margin-bottom: 2px; text-transform: uppercase; }
            .tagline, .address-info { font-size: 9px; margin: 0; line-height: 1.2; }
            
            /* REVISI: Header Kanan Lebih Ringkas & Nomor Lebih Besar */
            .header-right { text-align: right; border: 1px dashed #000; padding: 5px; }
            .invoice-title { font-size: 18px; font-weight: 900; color: #444; }
            .invoice-number { font-size: 13px; font-weight: bold; display: block; margin-top: 2px; }

            /* Grid Data Pelanggan */
            .client-data { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1.5fr; gap: 4px 8px; font-size: 10px; margin-bottom: 12px; border: 1px solid #ddd; padding: 6px; }
            .client-data label { font-weight: bold; display: flex; justify-content: space-between; }
            .display-data { border-bottom: 1px dotted #aaa; font-size: 10px; min-height: 16px; font-weight: 500; text-transform: uppercase; }

            /* Tabel Rincian */
            .service-table { width: 100%; border-collapse: collapse; font-size: 10px; margin-bottom: 10px; }
            .service-table th, .service-table td { border: 1px solid #000; padding: 4px; }
            .service-table th { background-color: #f0f0f0 !important; text-align: center; }
            .category-header { background-color: #e0e0e0 !important; font-weight: bold; }

            /* REVISI: Area Bawah (Footer) Gabungan Kotak Perhatian & Tanda Tangan */
            .footer-area {
                display: flex; justify-content: space-between; align-items: flex-end;
                margin-top: auto; padding-top: 15px; /* Mendorong selalu ke bagian paling bawah konten */
            }

            /* REVISI: Kotak Perhatian Abu Terang & Berukuran 4 cm */
            .note-box { 
                width: 4cm; 
                background-color: #f0f0f0 !important; 
                border: 1px solid #999; 
                padding: 6px; 
                font-size: 7.5px; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
            }
            .note-title { font-weight: bold; text-decoration: underline; display: block; margin-bottom: 4px; font-size: 8px; text-align: center; }
            .note-box ol { margin: 0; padding-left: 14px; }
            .note-box li { margin-bottom: 3px; line-height: 1.2; }

            /* Tanda Tangan bergeser ke kanan */
            .signature-wrapper { display: flex; gap: 20px; font-size: 10px; }
            .signature-box { text-align: center; width: 3.8cm; }
            .signature-line { display: block; margin-top: 40px; border-bottom: 1px solid #000; font-weight: bold; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app-ui">
        <header class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-lg">
            <div class="font-bold text-xl flex items-center italic">
                <i class="fas fa-tools mr-3 text-yellow-400"></i> OnePrint <span class="text-blue-400 ml-1">Cloud</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col text-right">
                    <span id="user-display" class="text-[10px] text-cyan-300 font-mono"></span>
                    <span id="idle-timer" class="text-[9px] text-gray-400 italic">Sesi Aktif</span>
                </div>
                <button id="btn-logout" class="bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center">
                    <i class="fas fa-power-off mr-2"></i> LOGOUT
                </button>
            </div>
        </header>

        <main class="p-4 grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white rounded-xl shadow-sm p-5 border">
                    <div class="flex gap-2">
                        <div class="relative flex-grow">
                            <i class="fas fa-barcode absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" id="barcode-input" placeholder="Scan Serial Number (Tekan Enter)..." class="w-full pl-10 pr-3 py-2 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <button id="btn-scan" class="bg-slate-700 text-white px-4 rounded-lg hover:bg-slate-800"><i class="fas fa-camera"></i></button>
                        <button id="btn-remote-scan" class="bg-indigo-600 text-white px-4 rounded-lg hover:bg-indigo-700"><i class="fas fa-mobile-alt"></i></button>
                    </div>
                    <div id="reader" class="w-full hidden mt-4 border-2 border-dashed border-gray-300 rounded-lg overflow-hidden"></div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-5 border">
                    <h3 class="font-bold text-gray-700 mb-3 flex items-center"><i class="fas fa-list-ul mr-2"></i> Tambah Item Biaya</h3>
                    <div class="flex border-b mb-4 text-sm">
                        <button onclick="setTab('jasa')" id="tab-jasa" class="px-6 py-2 border-b-2 border-blue-600 text-blue-600 font-bold">Jasa Servis</button>
                        <button onclick="setTab('sparepart')" id="tab-sparepart" class="px-6 py-2 text-gray-500">Sparepart / Tinta</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-12 gap-2">
                        <input type="text" id="input-item-nama" placeholder="Keterangan rincian..." class="sm:col-span-8 p-2 border rounded bg-gray-50 outline-none focus:border-blue-500">
                        <input type="number" id="input-item-harga" placeholder="Harga" class="sm:col-span-3 p-2 border rounded bg-gray-50 outline-none focus:border-blue-500">
                        <button id="btn-tambah-item" class="sm:col-span-1 bg-blue-600 text-white rounded hover:bg-blue-700"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-5 border flex flex-col h-fit">
                <h2 class="font-bold text-gray-800 mb-4 border-b pb-2">DATA WORK ORDER</h2>
                <div class="space-y-2 mb-4">
                    <input type="text" id="input-nama" placeholder="Nama Pelanggan" class="w-full p-2 text-sm border rounded outline-none focus:bg-blue-50">
                    <input type="text" id="input-telp" placeholder="No. HP / WA" class="w-full p-2 text-sm border rounded outline-none focus:bg-blue-50">
                    <input type="text" id="input-merk" placeholder="Merk / Model Perangkat" class="w-full p-2 text-sm border rounded outline-none focus:bg-blue-50">
                    <input type="text" id="input-kelengkapan" placeholder="Kelengkapan (Kabel, Dus, dll)" class="w-full p-2 text-sm border rounded outline-none focus:bg-blue-50">
                    <textarea id="input-keluhan" placeholder="Keluhan / Kendala Kerusakan" class="w-full p-2 text-sm border rounded outline-none focus:bg-blue-50 h-20"></textarea>
                </div>

                <div id="list-transaksi" class="border rounded p-2 bg-gray-50 text-xs min-h-[120px] mb-4">
                    <div class="text-center text-gray-400 mt-10 italic">Daftar biaya servis kosong.</div>
                </div>

                <div class="flex justify-between font-bold text-lg text-blue-700 mb-4 px-1">
                    <span>Total Biaya</span>
                    <span id="text-total">Rp 0</span>
                </div>

                <div class="grid grid-cols-1 gap-2">
                    <button onclick="cetakDokumen('tanda-terima')" class="bg-amber-500 text-white font-bold py-2 rounded-lg hover:bg-amber-600 text-sm">
                        <i class="fas fa-file-invoice mr-2"></i> CETAK TANDA TERIMA
                    </button>
                    <button onclick="cetakDokumen('nota')" class="bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 text-sm">
                        <i class="fas fa-print mr-2"></i> CETAK NOTA A5 (INVOICE)
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="print-container" style="display: none;"></div>

    <div id="qr-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl text-center shadow-2xl max-w-xs w-full">
            <h3 class="font-bold mb-3">Scan via Smartphone</h3>
            <div id="qrcode" class="flex justify-center mb-6 p-2 bg-white border rounded"></div>
            <button id="close-modal" class="w-full py-2 text-gray-500 font-semibold hover:text-red-500">Tutup</button>
        </div>
    </div>

    <script>
        // === 1. KONFIGURASI FIREBASE & AUTH ===
        const firebaseConfig = {
            apiKey: "AIzaSyBcyS36JnJNGZPdSxd_g9UmCq4BJRiG2rA",
            authDomain: "oneprintservice-db.firebaseapp.com",
            databaseURL: "https://oneprintservice-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "oneprintservice-db",
            storageBucket: "oneprintservice-db.firebasestorage.app",
            messagingSenderId: "330853999249",
            appId: "1:330853999249:web:4503ed115d2694d9cb5530"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html'; 
            } else {
                // Hanya ambil bagian depan sebelum tanda @ untuk ditampilkan
                const usernameOnly = user.email.split('@')[0];
                document.getElementById('user-display').innerText = "User: " + usernameOnly.toUpperCase();
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            auth.signOut().then(() => window.location.href = 'login.html');
        });

        // === 2. AUTO LOGOUT 30 MENIT ===
        let idleTime = 0;
        setInterval(() => {
            if (auth.currentUser) {
                idleTime++;
                document.getElementById('idle-timer').innerText = `Idle: ${idleTime}/30 mnt`;
                if (idleTime >= 30) {
                    alert("Sesi berakhir karena tidak ada aktivitas selama 30 menit.");
                    auth.signOut().then(() => window.location.href = 'login.html');
                }
            }
        }, 60000); 

        function resetTimer() { idleTime = 0; document.getElementById('idle-timer').innerText = "Sesi Aktif"; }
        window.onload = resetTimer;
        window.onmousemove = resetTimer;
        window.onmousedown = resetTimer;
        window.ontouchstart = resetTimer;
        window.onclick = resetTimer;
        window.onkeypress = resetTimer;


        // === 3. DATABASE FIREBASE REALTIME ===
        function simpanDataKeDatabase() {
            const sn = document.getElementById('barcode-input').value.trim();
            if (!sn || sn === '-') return; 
            
            const safeSn = sn.replace(/[.#$[\]]/g, "_"); 
            db.ref('pelanggan/' + safeSn).set({
                nama: document.getElementById('input-nama').value,
                telp: document.getElementById('input-telp').value,
                merk: document.getElementById('input-merk').value,
                kelengkapan: document.getElementById('input-kelengkapan').value
            });
        }

        const barcodeInput = document.getElementById('barcode-input');
        
        function isiDataOtomatis(sn) {
            sn = sn.trim();
            if(!sn) return;
            const safeSn = sn.replace(/[.#$[\]]/g, "_");

            db.ref('pelanggan/' + safeSn).once('value').then(snapshot => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    document.getElementById('input-nama').value = data.nama || '';
                    document.getElementById('input-telp').value = data.telp || '';
                    document.getElementById('input-merk').value = data.merk || '';
                    document.getElementById('input-kelengkapan').value = data.kelengkapan || '';
                    document.getElementById('input-keluhan').value = ''; 
                    try { new Audio('https://www.soundjay.com/button/beep-07.mp3').play(); } catch(e){}
                } else {
                    document.getElementById('input-nama').value = '';
                    document.getElementById('input-telp').value = '';
                    document.getElementById('input-merk').value = '';
                    document.getElementById('input-kelengkapan').value = '';
                    document.getElementById('input-keluhan').value = '';
                }
            });
        }

        barcodeInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') isiDataOtomatis(this.value);
        });

        function tanganiScanSukses(text) {
            barcodeInput.value = text;
            isiDataOtomatis(text);
        }

        // === 4. MANAJEMEN TAB & TRANSAKSI ===
        let currentTab = 'jasa';
        let daftarTransaksi = { jasa: [], sparepart: [] };

        function setTab(tab) {
            currentTab = tab;
            document.getElementById('tab-jasa').className = tab === 'jasa' ? "px-6 py-2 border-b-2 border-blue-600 text-blue-600 font-bold" : "px-6 py-2 text-gray-500";
            document.getElementById('tab-sparepart').className = tab === 'sparepart' ? "px-6 py-2 border-b-2 border-blue-600 text-blue-600 font-bold" : "px-6 py-2 text-gray-500";
        }

        document.getElementById('btn-tambah-item').addEventListener('click', () => {
            const nama = document.getElementById('input-item-nama').value;
            const harga = parseInt(document.getElementById('input-item-harga').value) || 0;
            if(!nama || harga <= 0) return;
            daftarTransaksi[currentTab].push({ nama, harga });
            document.getElementById('input-item-nama').value = '';
            document.getElementById('input-item-harga').value = '';
            updateList();
        });

        function updateList() {
            const list = document.getElementById('list-transaksi');
            list.innerHTML = '';
            let total = 0;
            ['jasa', 'sparepart'].forEach(cat => {
                if(daftarTransaksi[cat].length > 0) {
                    list.innerHTML += `<div class="font-bold text-blue-800 mb-1 mt-2 uppercase text-[9px]">${cat}</div>`;
                    daftarTransaksi[cat].forEach((item, idx) => {
                        list.innerHTML += `<div class="flex justify-between py-1 border-b border-gray-200">
                            <span class="uppercase">${item.nama}</span>
                            <span>Rp ${item.harga.toLocaleString()} <i onclick="hapus(${idx},'${cat}')" class="fas fa-times-circle text-red-400 ml-2 cursor-pointer"></i></span>
                        </div>`;
                        total += item.harga;
                    });
                }
            });
            if(total === 0) list.innerHTML = '<div class="text-center text-gray-400 mt-10 italic">Daftar biaya servis kosong.</div>';
            document.getElementById('text-total').innerText = 'Rp ' + total.toLocaleString();
            return total;
        }

        function hapus(idx, cat) { daftarTransaksi[cat].splice(idx,1); updateList(); }

        // === 5. SCRIPT SETUP KAMERA & PEER JS ===
        let html5QrcodeScanner;
        document.getElementById('btn-scan').addEventListener('click', () => {
            const readerDiv = document.getElementById('reader');
            readerDiv.classList.toggle('hidden');
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: {width: 250, height: 100} });
                html5QrcodeScanner.render((text) => { tanganiScanSukses(text); html5QrcodeScanner.clear(); readerDiv.classList.add('hidden'); });
            }
        });

        const peer = new Peer('oneprint-pos-server'); 
        const qrModal = document.getElementById('qr-modal');
        let refreshTimer;

        document.getElementById('btn-remote-scan').addEventListener('click', () => {
            qrModal.classList.remove('hidden');
            document.getElementById("qrcode").innerHTML = "";
            const sessionId = 'oneprint-' + Date.now();
            const scannerUrl = window.location.origin + window.location.pathname.replace('dashboard.html', 'scanner.html') + '?sid=' + sessionId;
            new QRCode(document.getElementById("qrcode"), { text: scannerUrl, width: 200, height: 200 });
            refreshTimer = setInterval(() => {
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: scannerUrl, width: 200, height: 200 });
            }, 30000);
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            clearInterval(refreshTimer); qrModal.classList.add('hidden');
        });

        peer.on('connection', (conn) => {
            clearInterval(refreshTimer); qrModal.classList.add('hidden');
            alert("HP Terhubung sebagai Scanner!");
            conn.on('data', (data) => tanganiScanSukses(data));
        });

        // === 6. FUNGSI CETAK (DENGAN REVISI UI FOOTER) ===
        function cetakDokumen(tipe) {
            simpanDataKeDatabase();

            const nama = document.getElementById('input-nama').value || '-';
            const telp = document.getElementById('input-telp').value || '-';
            const merk = document.getElementById('input-merk').value || '-';
            const kelengkapan = document.getElementById('input-kelengkapan').value || '-';
            const keluhan = document.getElementById('input-keluhan').value || '-';
            const sn = document.getElementById('barcode-input').value || '-';
            const total = updateList();
            const tgl = new Date().toLocaleDateString('id-ID');
            
            const now = new Date();
            const year = String(now.getFullYear()).slice(-2);
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hour = String(now.getHours()).padStart(2, '0');
            const minute = String(now.getMinutes()).padStart(2, '0');
            const noNota = `${year}${month}${day}${hour}${minute}`;

            let content = '';
            
            // REVISI: Header Kanan Dibuat Bersih Tanpa Teks Lembar Salinan
            const kopHeader = `
                <div class="header">
                    <div class="header-left">
                        <img src="logos.png" class="logo-image" onerror="this.outerHTML='<div style=\\'width:60px;height:60px;border:1px solid #000;margin-right:12px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;\\'>LOGO</div>'">
                        <div class="company-info">
                            <div class="company-name">OnePrint Service</div>
                            <p class="tagline italic">Melayani Perbaikan Printer, Laptop, dan Komputer</p>
                            <p class="address-info">Jl. Jula-Juli No.71 Tambakbayan, Ponorogo</p>
                            <p class="address-info font-bold">HP / WA: 082-337-557-178</p>
                        </div>
                    </div>
                    <div class="header-right">
                        <div class="invoice-title">${tipe === 'nota' ? 'INVOICE' : 'TANDA TERIMA'}</div>
                        <span class="invoice-number">No: ${tipe === 'nota' ? 'INV' : 'TT'}-${noNota}</span>
                    </div>
                </div>`;

            const clientGrid = `
                <div class="client-data">
                    <label>Nama Pelanggan <span>:</span></label><span class="display-data">${nama}</span>
                    <label>Tanggal <span>:</span></label><span class="display-data">${tgl}</span>
                    <label>No. Telp/WA <span>:</span></label><span class="display-data">${telp}</span>
                    <label>Merk/Model <span>:</span></label><span class="display-data">${merk}</span>
                    <label>Serial Number <span>:</span></label><span class="display-data">${sn}</span>
                    <label>Kelengkapan <span>:</span></label><span class="display-data">${kelengkapan}</span>
                </div>`;

            if(tipe === 'nota') {
                let rows = '';
                ['jasa', 'sparepart'].forEach(cat => {
                    rows += `<tr class="category-header"><td style="text-align:center">-</td><td colspan="2">${cat === 'jasa' ? 'A. Jasa Perbaikan' : 'B. Sparepart & Tinta'}</td></tr>`;
                    if(daftarTransaksi[cat].length === 0) rows += `<tr><td style="text-align:center">-</td><td>-</td><td style="text-align:right">-</td></tr>`;
                    daftarTransaksi[cat].forEach((item, i) => {
                        rows += `<tr><td style="text-align:center">${i+1}</td><td class="uppercase">${item.nama}</td><td style="text-align:right">Rp ${item.harga.toLocaleString()}</td></tr>`;
                    });
                });

                content = `
                <div class="invoice-page">
                    ${kopHeader}
                    ${clientGrid}
                    <table class="service-table">
                        <thead><tr><th width="5%">No</th><th width="75%">Rincian Biaya</th><th width="20%">Biaya</th></tr></thead>
                        <tbody>${rows}</tbody>
                        <tfoot><tr class="font-bold"><td colspan="2" style="text-align:right">TOTAL BIAYA :</td><td style="text-align:right; background:#eee;">Rp ${total.toLocaleString()}</td></tr></tfoot>
                    </table>
                    
                    <div class="footer-area">
                        <div class="note-box">
                            <span class="note-title">PERHATIAN !</span>
                            <ol>
                                <li>Simpan nota ini sebagai bukti garansi.</li>
                                <li>Garansi hangus jika segel rusak atau cacat fisik karena pemakaian.</li>
                            </ol>
                        </div>
                        <div class="signature-wrapper">
                            <div class="signature-box"><span>Hormat Kami,</span><span class="signature-line">OnePrint Service</span></div>
                            <div class="signature-box"><span>Pelanggan,</span><span class="signature-line">(${nama})</span></div>
                        </div>
                    </div>
                </div>`;
            } else {
                content = `
                <div class="invoice-page">
                    ${kopHeader}
                    ${clientGrid}
                    <div style="border:1px solid #000; padding:8px; min-height:150px; font-size:10px;">
                        <div style="font-bold; border-bottom:1px solid #ccc; margin-bottom:5px; padding-bottom:3px;">KELUHAN / KENDALA PERANGKAT:</div>
                        <div class="uppercase">${keluhan.replace(/\n/g, '<br>')}</div>
                    </div>
                    
                    <div class="footer-area">
                        <div class="note-box">
                            <span class="note-title">SYARAT PENGAMBILAN:</span>
                            <ol>
                                <li>WAJIB membawa tanda terima ini saat pengambilan barang.</li>
                                <li>Barang yang tidak diambil lebih dari 2 bulan bukan lagi tanggung jawab kami.</li>
                            </ol>
                        </div>
                        <div class="signature-wrapper">
                            <div class="signature-box"><span>Penerima,</span><span class="signature-line">OnePrint Service</span></div>
                            <div class="signature-box"><span>Pelanggan,</span><span class="signature-line">(${nama})</span></div>
                        </div>
                    </div>
                </div>`;
            }

            document.getElementById('print-container').innerHTML = content;
            window.print();
        }
    </script>
</body>
</html>
