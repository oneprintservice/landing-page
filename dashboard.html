<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kasir - OnePrint Service</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Ukuran Kertas Thermal / Label Custom (100mm x 150mm) */
        @page { 
            size: 100mm 150mm; 
            margin: 0; 
        }

        @media print {
            /* Sembunyikan semua antarmuka web saat mencetak */
            #app-ui, #qr-modal { display: none !important; }
            
            /* Tampilkan area khusus cetak */
            #print-container { 
                display: block !important; 
                position: absolute; 
                left: 0; 
                top: 0; 
                background: white;
                font-family: Arial, sans-serif;
                color: black;
            }

            /* 1. Mode INVOICE (Potret / Tegak) */
            .mode-potret {
                width: 100mm;
                height: 150mm;
                padding: 4mm;
                box-sizing: border-box;
            }

            /* 2. Mode TANDA TERIMA (Lanskap / Menyamping) 
               Diputar otomatis lewat CSS agar muat di kertas potret */
            .mode-lanskap {
                width: 150mm;
                height: 100mm;
                padding: 5mm;
                box-sizing: border-box;
                /* Logika memutar 90 derajat searah jarum jam */
                transform-origin: 0 0;
                transform: translate(100mm, 0) rotate(90deg);
            }

            /* Gaya khusus untuk tabel dan teks di kertas thermal */
            .print-border { border: 1px solid black; }
            .print-border-b { border-bottom: 1px solid black; }
            .print-border-t { border-top: 1px solid black; }
            .print-text-xs { font-size: 10px; line-height: 1.3; }
            .print-text-sm { font-size: 12px; font-weight: bold; }
            .print-text-md { font-size: 16px; font-weight: bold; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <div id="app-ui" class="flex flex-col flex-grow">
        <header class="bg-gray-800 text-white p-4 flex justify-between items-center shadow-md">
            <div class="font-bold text-xl flex items-center">
                <i class="fas fa-print mr-3 text-blue-400"></i> OnePrint Service <span class="text-sm font-normal text-gray-400 ml-3">| Ponorogo</span>
            </div>
            <a href="login.html" class="bg-red-500 px-3 py-1 rounded text-sm hover:bg-red-600">Logout</a>
        </header>

        <main class="flex-grow p-4 grid grid-cols-1 lg:grid-cols-3 gap-4">
            
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm p-5 border flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <div class="flex gap-2">
                        <div class="relative flex-grow">
                            <i class="fas fa-barcode absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" id="barcode-input" placeholder="Scan Barcode / SN..." class="w-full pl-10 pr-3 py-2 bg-gray-50 border rounded-lg focus:outline-none focus:border-blue-500" autofocus>
                        </div>
                        <button id="btn-scan" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700" title="Kamera Laptop"><i class="fas fa-camera"></i></button>
                        <button id="btn-remote-scan" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700" title="Kamera HP"><i class="fas fa-mobile-alt"></i> Mode HP</button>
                    </div>
                    <div id="reader" class="w-full hidden border-2 border-dashed border-gray-300 rounded-lg overflow-hidden mt-2"></div>
                </div>

                <div class="flex border-b mt-2">
                    <button class="px-4 py-2 text-blue-600 border-b-2 border-blue-600 font-semibold text-sm">Jasa Servis</button>
                    <button class="px-4 py-2 text-gray-500 text-sm">Sparepart & Tinta</button>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-2">
                    <div class="border rounded-lg p-3 text-center text-xs hover:bg-blue-50 cursor-pointer transition">
                        <i class="fas fa-tools text-xl mb-1 text-gray-600"></i>
                        <div class="font-bold">Servis Mekanik</div>
                        <div class="text-blue-600">Rp 95.000</div>
                    </div>
                    <div class="border rounded-lg p-3 text-center text-xs hover:bg-blue-50 cursor-pointer transition">
                        <i class="fas fa-tint text-xl mb-1 text-gray-600"></i>
                        <div class="font-bold">Tinta Epson</div>
                        <div class="text-blue-600">Rp 85.000</div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-5 border flex flex-col">
                <h2 class="font-bold text-lg text-gray-800 mb-4 border-b pb-2"><i class="fas fa-receipt mr-2"></i> Work Order</h2>
                <div class="flex-grow">
                    <input type="text" id="input-nama" placeholder="Nama Pelanggan" class="w-full p-2 mb-2 text-sm border rounded bg-gray-50 outline-none">
                    <input type="text" id="input-telp" placeholder="No. Telp / HP" class="w-full p-2 mb-2 text-sm border rounded bg-gray-50 outline-none">
                    <textarea id="input-kendala" placeholder="Merk & Kendala Perangkat..." class="w-full p-2 mb-4 text-sm border rounded bg-gray-50 h-24 outline-none"></textarea>
                    
                    <div class="flex justify-between font-bold text-xl text-blue-600 border-t pt-4">
                        <span>Total (Est)</span>
                        <input type="text" id="input-total" value="95.000" class="w-24 text-right bg-transparent outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-4">
                    <button onclick="cetakDokumen('tanda-terima')" class="bg-yellow-500 text-white font-bold py-3 rounded-lg hover:bg-yellow-600 text-sm">CETAK TANDA TERIMA</button>
                    <button onclick="cetakDokumen('nota')" class="bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 text-sm">CETAK INVOICE</button>
                </div>
            </div>
        </main>
    </div>

    <div id="print-container" style="display: none;"></div>

    <div id="qr-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-2xl text-center shadow-xl max-w-xs w-full">
            <h3 class="font-bold mb-2">Scan Mode HP</h3>
            <p class="text-[10px] text-gray-500 mb-4">Arahkan kamera HP Anda ke kode ini. Kode diperbarui otomatis setiap 30 detik.</p>
            <div id="qrcode" class="flex justify-center mb-6 border p-2 rounded-lg bg-white"></div>
            <button id="close-modal" class="w-full bg-red-100 text-red-600 font-bold py-2 rounded-lg hover:bg-red-200">BATAL</button>
        </div>
    </div>

    <script>
        // === 1. DATABASE TIRUAN UNTUK OTOMASI SCAN ===
        const dataPelanggan = {
            "SN12345": { nama: "RSU AISYIYAH PONOROGO", telp: "0812xxxxxx", perangkat: "CANON LBP2900", kendala: "Mati Total" },
            "SN98765": { nama: "Siska", telp: "0856xxxxxx", perangkat: "Epson L3110", kendala: "Tinta Mampet" }
        };

        const barcodeInput = document.getElementById('barcode-input');
        
        // Fungsi memproses hasil scan
        function tanganiScanSukses(text) {
            barcodeInput.value = text;
            new Audio('https://www.soundjay.com/button/beep-07.mp3').play();
            
            // Cek apakah SN ada di database tiruan
            if(dataPelanggan[text]) {
                document.getElementById('input-nama').value = dataPelanggan[text].nama;
                document.getElementById('input-telp').value = dataPelanggan[text].telp;
                document.getElementById('input-kendala').value = `Merk: ${dataPelanggan[text].perangkat}\nKendala: ${dataPelanggan[text].kendala}`;
            } else {
                document.getElementById('input-kendala').value = "Perangkat Baru / SN Belum Terdaftar";
            }
        }

        // === 2. KAMERA LAPTOP ===
        let html5QrcodeScanner;
        document.getElementById('btn-scan').addEventListener('click', () => {
            const readerDiv = document.getElementById('reader');
            readerDiv.classList.toggle('hidden');
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: {width: 250, height: 100} });
                html5QrcodeScanner.render((text) => {
                    tanganiScanSukses(text);
                    html5QrcodeScanner.clear();
                    readerDiv.classList.add('hidden');
                });
            }
        });

        // === 3. REMOTE SCANNER HP (PEER JS) ===
        const peer = new Peer('oneprint-pos-server'); 
        const qrModal = document.getElementById('qr-modal');
        let refreshTimer;

        function generateSecureQR() {
            document.getElementById("qrcode").innerHTML = "";
            const sessionId = 'oneprint-' + Date.now();
            const scannerUrl = window.location.origin + window.location.pathname.replace('dashboard.html', 'scanner.html') + '?sid=' + sessionId;
            new QRCode(document.getElementById("qrcode"), { text: scannerUrl, width: 200, height: 200 });
        }

        document.getElementById('btn-remote-scan').addEventListener('click', () => {
            qrModal.classList.remove('hidden');
            generateSecureQR();
            refreshTimer = setInterval(generateSecureQR, 30000);
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            clearInterval(refreshTimer);
            qrModal.classList.add('hidden');
        });

        peer.on('connection', (conn) => {
            clearInterval(refreshTimer);
            qrModal.classList.add('hidden');
            alert("HP Terhubung sebagai Scanner!");
            conn.on('data', (data) => tanganiScanSukses(data));
        });

        // === 4. FUNGSI CETAK DOKUMEN (ROTER & ISI OTOMATIS) ===
        function cetakDokumen(tipe) {
            const nama = document.getElementById('input-nama').value || '-';
            const telp = document.getElementById('input-telp').value || '-';
            const info = document.getElementById('input-kendala').value || '-';
            const sn = document.getElementById('barcode-input').value || '-';
            const total = document.getElementById('input-total').value || '0';
            
            // Ekstrak merk dari textbox kendala (jika ada tulisan "Merk:")
            let merk = "Cek Fisik";
            if(info.includes("Merk:")) {
                merk = info.split('\n')[0].replace('Merk: ', '');
            }

            const tgl = new Date().toLocaleDateString('id-ID', {day: '2-digit', month: '2-digit', year: 'numeric'});
            const noNota = Math.floor(Math.random() * 10000000000); // Generate No Seri Acak
            const printContainer = document.getElementById('print-container');

            if (tipe === 'nota') {
                // RENDER INVOICE (POTRET)
                printContainer.innerHTML = `
                <div class="mode-potret flex flex-col">
                    <div class="text-center print-border-b pb-1 mb-1">
                        <div class="print-text-md">OnePrint Service</div>
                        <div class="print-text-xs italic">Melayani Perbaikan Printer, Laptop, dan Komputer</div>
                        <div class="print-text-xs mt-1">Alamat: Jl. Jula-Juli No.71 Tambakbayan, Ponorogo</div>
                        <div class="print-text-xs font-bold">SERVICE HP: 082-337-557-178</div>
                    </div>
                    
                    <div class="text-center print-text-sm my-1">INVOICE</div>
                    <div class="flex justify-between print-text-xs mb-2">
                        <div>No. Nota: ${noNota}</div>
                        <div>Lembar Asli/Toko</div>
                    </div>

                    <table class="w-full print-text-xs mb-2">
                        <tr><td width="30%">Nama Pelanggan</td><td width="5%">:</td><td>${nama}</td></tr>
                        <tr><td>No. Telp/HP</td><td>:</td><td>${telp}</td></tr>
                        <tr><td>Serial Number</td><td>:</td><td>${sn}</td></tr>
                        <tr><td>Tanggal Transaksi</td><td>:</td><td>${tgl}</td></tr>
                        <tr><td>Merk/Model</td><td>:</td><td>${merk}</td></tr>
                    </table>

                    <table class="w-full print-text-xs print-border text-left collapse">
                        <tr class="print-border-b">
                            <th class="p-1 w-6 text-center">No.</th>
                            <th class="p-1 border-l print-border">Rincian Biaya Perbaikan</th>
                            <th class="p-1 border-l print-border w-20 text-center">Biaya</th>
                        </tr>
                        <tr><td colspan="3" class="p-1 font-bold">A. Jasa Perbaikan</td></tr>
                        <tr><td class="p-1 text-center">1.</td><td class="p-1 border-l print-border">Servis Perbaikan</td><td class="p-1 border-l print-border text-right">${total}</td></tr>
                        <tr><td colspan="3" class="p-1 font-bold print-border-t">B. Pergantian Sparepart</td></tr>
                        <tr><td class="p-1 text-center">1.</td><td class="p-1 border-l print-border">-</td><td class="p-1 border-l print-border text-right">-</td></tr>
                        <tr class="print-border-t font-bold">
                            <td colspan="2" class="p-1 text-right">TOTAL BIAYA:</td>
                            <td class="p-1 text-right">Rp ${total}</td>
                        </tr>
                    </table>

                    <div class="flex justify-between text-center print-text-xs mt-4">
                        <div class="w-1/2">
                            <div>Hormat Kami,</div>
                            <div class="mt-8">OnePrint Service</div>
                        </div>
                        <div class="w-1/2">
                            <div>Pelanggan,</div>
                            <div class="mt-8">(${nama})</div>
                        </div>
                    </div>

                    <div class="mt-auto print-border-t pt-1 print-text-[9px]">
                        <div class="font-bold">PERHATIAN !</div>
                        <div>1. Simpan nota/invoice sebagai bukti garansi.</div>
                        <div>2. Garansi hangus apabila tanpa nota, segel rusak, atau barang cacat fisik karena kesalahan pemakaian.</div>
                    </div>
                </div>`;
            } 
            else if (tipe === 'tanda-terima') {
                // RENDER TANDA TERIMA (LANSKAP - DIPUTAR 90 DERAJAT)
                printContainer.innerHTML = `
                <div class="mode-lanskap flex flex-col justify-between">
                    <div class="flex justify-between items-start print-border-b pb-2 mb-2">
                        <div>
                            <div class="print-text-md uppercase tracking-widest">Tanda Terima Servis</div>
                            <div class="print-text-xs mt-1">NO: TT-${noNota}</div>
                        </div>
                        <div class="text-right">
                            <div class="print-text-sm">OnePrint Service</div>
                            <div class="print-text-[9px]">Jl. Jula-Juli No.71, Ponorogo | 082-337-557-178</div>
                        </div>
                    </div>

                    <div class="flex print-text-xs gap-4 border-b pb-2 border-dashed border-gray-400">
                        <div class="w-1/2">
                            <table class="w-full">
                                <tr><td width="35%">Tanggal Masuk</td><td width="5%">:</td><td class="font-bold">${tgl}</td></tr>
                                <tr><td>Pelanggan</td><td>:</td><td class="font-bold">${nama}</td></tr>
                                <tr><td>No. Telp</td><td>:</td><td>${telp}</td></tr>
                            </table>
                        </div>
                        <div class="w-1/2">
                            <table class="w-full">
                                <tr><td width="35%">Merk/Model</td><td width="5%">:</td><td class="font-bold">${merk}</td></tr>
                                <tr><td>No. Seri (SN)</td><td>:</td><td class="font-bold">${sn}</td></tr>
                            </table>
                        </div>
                    </div>

                    <div class="mt-1 print-text-[10px] min-h-[40px]">
                        <strong>Keluhan/Kendala:</strong><br>
                        ${info.replace(/\n/g, '<br>')}
                    </div>

                    <div class="flex justify-between text-center print-text-xs mt-2">
                        <div class="w-1/3">
                            <div>Penerima,</div>
                            <div class="mt-6 border-b border-black w-24 mx-auto"></div>
                            <div>(OnePrint Service)</div>
                        </div>
                        <div class="w-1/3 text-left px-2 print-text-[8px] italic flex items-center">
                            * Bawa tanda terima ini saat pengambilan.<br>
                            * Barang yang tidak diambil > 2 bulan di luar tanggung jawab kami.
                        </div>
                        <div class="w-1/3">
                            <div>Penyerah,</div>
                            <div class="mt-6 border-b border-black w-24 mx-auto"></div>
                            <div>(${nama})</div>
                        </div>
                    </div>
                </div>`;
            }

            // Panggil dialog print browser
            window.print();
        }
    </script>
</body>
</html>
