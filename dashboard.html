<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard OnePrint - Ponorogo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* CSS Cetak A5 tetap dipertahankan dari file asli */
        @media print {
            #app-ui, #qr-modal { display: none !important; }
            body { background-color: white; margin: 0; padding: 0; }
            @page { size: A5 portrait; margin: 0.1in 0.15in; }
            #print-container { display: block !important; width: 100%; font-family: Arial, sans-serif; }
            .invoice-page { width: 148mm; height: 210mm; box-sizing: border-box; margin: 0 auto; position: relative; }
            /* ... (styling header & table sama seperti sebelumnya) ... */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app-ui" class="opacity-0 transition-opacity duration-500">
        <header class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-md">
            <div class="font-bold text-lg flex items-center">
                <i class="fas fa-print mr-3 text-cyan-400"></i> OnePrint <span class="text-blue-300 ml-1 font-light italic">Cloud</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex flex-col text-right">
                    <span id="user-display" class="text-[10px] text-cyan-300 font-mono"></span>
                    <span id="idle-timer" class="text-[9px] text-gray-400 italic">Sesi Aktif</span>
                </div>
                <button id="btn-logout" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-xs font-bold flex items-center transition">
                    <i class="fas fa-power-off mr-2"></i> KELUAR
                </button>
            </div>
        </header>

        <main class="p-4 grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div class="lg:col-span-2 space-y-4">
                <div class="bg-white rounded-xl shadow-sm p-5 border">
                    <div class="flex gap-2">
                        <div class="relative flex-grow">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                            <input type="text" id="barcode-input" placeholder="Scan atau Ketik SN Pelanggan..." class="w-full pl-10 pr-3 py-2 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>
                        <button id="btn-scan" class="bg-slate-700 text-white px-4 rounded-lg"><i class="fas fa-camera"></i></button>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-5 border">
                    <div class="flex border-b mb-4 text-sm font-bold">
                        <button onclick="setTab('jasa')" id="tab-jasa" class="px-6 py-2 border-b-2 border-blue-600 text-blue-600">Jasa Servis</button>
                        <button onclick="setTab('sparepart')" id="tab-sparepart" class="px-6 py-2 text-gray-400">Sparepart</button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-12 gap-2">
                        <input type="text" id="input-item-nama" placeholder="Keterangan..." class="sm:col-span-8 p-2 border rounded bg-gray-50">
                        <input type="number" id="input-item-harga" placeholder="Harga" class="sm:col-span-3 p-2 border rounded bg-gray-50">
                        <button id="btn-tambah-item" class="sm:col-span-1 bg-blue-600 text-white rounded"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-5 border flex flex-col h-fit">
                <h2 class="font-bold text-gray-700 mb-4 border-b pb-2 text-xs uppercase flex justify-between">
                    <span>Data Pelanggan</span>
                    <i class="fas fa-user-circle text-blue-500"></i>
                </h2>
                <div class="space-y-2 mb-4">
                    <input type="text" id="input-nama" placeholder="Nama Lengkap" class="w-full p-2 text-sm border rounded outline-none focus:bg-blue-50">
                    <input type="text" id="input-telp" placeholder="WhatsApp" class="w-full p-2 text-sm border rounded">
                    <input type="text" id="input-merk" placeholder="Merk & Seri Unit" class="w-full p-2 text-sm border rounded">
                    <input type="text" id="input-kelengkapan" placeholder="Kelengkapan" class="w-full p-2 text-sm border rounded">
                    <textarea id="input-keluhan" placeholder="Keluhan" class="w-full p-2 text-sm border rounded h-20"></textarea>
                </div>

                <div id="list-transaksi" class="border rounded p-2 bg-gray-50 text-[10px] min-h-[100px] mb-4 overflow-y-auto max-h-[180px]"></div>

                <div class="flex justify-between font-bold text-lg text-blue-800 mb-4 px-1">
                    <span class="text-sm self-end">TOTAL :</span>
                    <span id="text-total">Rp 0</span>
                </div>

                <div class="grid grid-cols-1 gap-2">
                    <button onclick="cetakDokumen('tanda-terima')" class="bg-amber-500 text-white font-bold py-2 rounded-lg text-sm">TANDA TERIMA</button>
                    <button onclick="cetakDokumen('nota')" class="bg-emerald-600 text-white font-bold py-3 rounded-lg text-sm shadow-md">CETAK NOTA A5</button>
                </div>
            </div>
        </main>
    </div>

    <div id="print-container" style="display: none;"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcyS36JnJNGZPdSxd_g9UmCq4BJRiG2rA",
            authDomain: "oneprintservice-db.firebaseapp.com",
            databaseURL: "https://oneprintservice-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "oneprintservice-db",
            storageBucket: "oneprintservice-db.firebasestorage.app",
            messagingSenderId: "330853999249",
            appId: "1:330853999249:web:4503ed115d2694d9cb5530"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. SESSION PROTECTION (Cek Status Login)
        auth.onAuthStateChanged(user => {
            if (!user) {
                // Jika tidak ada user, lempar ke login.html
                window.location.href = 'login.html';
            } else {
                // Jika login sukses, tampilkan dashboard
                document.getElementById('app-ui').classList.remove('opacity-0');
                document.getElementById('user-display').innerText = user.email;
            }
        });

        // 2. AUTO LOGOUT 30 MENIT
        let idleTime = 0;
        setInterval(() => {
            if (auth.currentUser) {
                idleTime++;
                document.getElementById('idle-timer').innerText = `Idle: ${idleTime}/30 mnt`;
                if (idleTime >= 30) logoutAction();
            }
        }, 60000);

        function resetTimer() { idleTime = 0; }
        window.onmousemove = resetTimer;
        window.onclick = resetTimer;
        window.onkeypress = resetTimer;

        // 3. LOGOUT ACTION
        function logoutAction() {
            auth.signOut().then(() => { window.location.href = 'login.html'; });
        }
        document.getElementById('btn-logout').addEventListener('click', logoutAction);

        // [LOGIKA SINKRONISASI DATABASE & PRINT SAMA SEPERTI SEBELUMNYA]
        // ... (Fungsi simpanKeCloud, ambilDariCloud, updateList, cetakDokumen) ...
    </script>
</body>
</html>
