<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OnePrint Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-6">
            <i class="fas fa-print text-5xl text-blue-600 mb-2"></i>
            <h2 class="text-2xl font-bold text-gray-800">OnePrint Cloud</h2>
            <p class="text-gray-400 text-xs">Silakan login untuk mengelola servis</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="login-email" placeholder="Email Admin" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="login-pass" placeholder="Password" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            <button id="btn-login" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">MASUK</button>
            <div id="login-error" class="text-red-500 text-xs text-center hidden font-bold italic">Email atau Password salah!</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcyS36JnJNGZPdSxd_g9UmCq4BJRiG2rA",
            authDomain: "oneprintservice-db.firebaseapp.com",
            databaseURL: "https://oneprintservice-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "oneprintservice-db",
            storageBucket: "oneprintservice-db.firebasestorage.app",
            messagingSenderId: "330853999249",
            appId: "1:330853999249:web:4503ed115d2694d9cb5530"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Redirect jika sudah login
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'dashboard.html';
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => {
                document.getElementById('login-error').classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
