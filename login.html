<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - OnePrint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white w-full max-w-sm p-8 rounded-2xl shadow-lg">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Admin Login</h1>
            <p class="text-gray-500 text-sm mt-1">OnePrint Service Access</p>
        </div>
        <form action="dashboard.html" method="GET" class="flex flex-col gap-4">
            <input type="text" placeholder="Username" class="w-full p-3 border rounded-lg focus:outline-none focus:border-blue-500" required>
            <input type="password" placeholder="Password" class="w-full p-3 border rounded-lg focus:outline-none focus:border-blue-500" required>
            <button type="submit" class="w-full mt-4 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">Masuk ke Dashboard</button>
        </form>
        <div class="text-center mt-6">
            <a href="index.html" class="text-sm text-blue-500 hover:underline"><i class="fas fa-arrow-left mr-1"></i> Kembali</a>
        </div>
    </div>
</body>
</html>
