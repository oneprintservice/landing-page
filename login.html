<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OnePrint Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">OnePrint Cloud</h2>
            <p class="text-gray-400 text-xs italic">Akses Teknisi Ponorogo</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-500 ml-1">USERNAME</label>
                <input type="text" id="login-user" placeholder="Contoh: admin" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 ml-1">PASSWORD</label>
                <input type="password" id="login-pass" placeholder="••••••••" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            </div>
            <button id="btn-login" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg">MASUK SISTEM</button>
            <div id="login-error" class="text-red-500 text-xs text-center hidden font-bold italic">Username atau Password salah!</div>
        </div>
    </div>

    <script>
        // Masukkan config Firebase Anda di sini
        const firebaseConfig = {
            apiKey: "AIzaSyBcyS36JnJNGZPdSxd_g9UmCq4BJRiG2rA",
            authDomain: "oneprintservice-db.firebaseapp.com",
            databaseURL: "https://oneprintservice-db-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "oneprintservice-db",
            storageBucket: "oneprintservice-db.firebasestorage.app",
            messagingSenderId: "330853999249",
            appId: "1:330853999249:web:4503ed115d2694d9cb5530"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Jika sudah login, langsung ke dashboard
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'dashboard.html';
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            const username = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value;
            
            if(!username || !pass) return;

            // Trik: Username diubah menjadi format email secara otomatis di belakang layar
            const emailFormat = username.includes('@') ? username : username + "@oneprint.com";

            auth.signInWithEmailAndPassword(emailFormat, pass).catch(err => {
                console.error(err);
                document.getElementById('login-error').classList.remove('hidden');
            });
        });

        // Fitur tekan Enter untuk login
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('btn-login').click();
        });
    </script>
</body>
</html>
